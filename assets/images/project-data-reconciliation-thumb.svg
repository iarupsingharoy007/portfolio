<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c8dff"/>
      <stop offset="55%" stop-color="#9b6bff"/>
      <stop offset="100%" stop-color="#ff8a4c"/>
    </linearGradient>
    <radialGradient id="glow3" cx="90%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#ff8a4c" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="640" height="400" fill="url(#bg3)"/>
  <circle cx="560" cy="20" r="150" fill="url(#glow3)" filter="url(#blur3)"/>
  <circle cx="60" cy="380" r="130" fill="#4c8dff" opacity="0.09" filter="url(#blur3)"/>

  <g transform="translate(70,60)">
    <rect x="0" y="0" width="500" height="280" rx="16" fill="#131316" stroke="rgba(255,255,255,0.08)"/>
    <rect x="0" y="0" width="500" height="34" rx="16" fill="#1a1a1f"/>
    <rect x="0" y="18" width="500" height="16" fill="#1a1a1f"/>
    <circle cx="22" cy="17" r="5" fill="#ff5f57"/>
    <circle cx="40" cy="17" r="5" fill="#febc2e"/>
    <circle cx="58" cy="17" r="5" fill="#28c840"/>
    <text x="250" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b6b72">reconciliation_engine</text>

    <!-- source / target columns -->
    <g font-family="JetBrains Mono, monospace" font-size="10.5">
      <rect x="24" y="52" width="200" height="196" rx="10" fill="#1a1a1f" stroke="rgba(255,255,255,0.06)"/>
      <text x="38" y="74" font-size="10" fill="#6b6b72">SOURCE.CSV</text>
      <rect x="38" y="86" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="38" y="106" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="38" y="126" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="38" y="146" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="38" y="166" width="172" height="14" rx="4" fill="#232328"/>

      <rect x="276" y="52" width="200" height="196" rx="10" fill="#1a1a1f" stroke="rgba(255,255,255,0.06)"/>
      <text x="290" y="74" font-size="10" fill="#6b6b72">TARGET.CSV</text>
      <rect x="290" y="86" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="290" y="106" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="290" y="126" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="290" y="146" width="172" height="14" rx="4" fill="#232328"/>
      <rect x="290" y="166" width="172" height="14" rx="4" fill="#232328"/>

      <!-- match / mismatch markers between columns -->
      <circle cx="250" cy="93" r="8" fill="#3ddc84" opacity="0.85"/>
      <path d="M246 93l3 3 6-6" stroke="#0b0b0d" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <circle cx="250" cy="113" r="8" fill="#3ddc84" opacity="0.85"/>
      <path d="M246 113l3 3 6-6" stroke="#0b0b0d" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <circle cx="250" cy="133" r="8" fill="#ff5f57" opacity="0.9"/>
      <path d="M246 129l8 8M254 129l-8 8" stroke="#0b0b0d" stroke-width="1.6" stroke-linecap="round"/>

      <circle cx="250" cy="153" r="8" fill="#3ddc84" opacity="0.85"/>
      <path d="M246 153l3 3 6-6" stroke="#0b0b0d" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <circle cx="250" cy="173" r="8" fill="#febc2e" opacity="0.9"/>
      <text x="247" y="177" font-size="10" fill="#0b0b0d" font-weight="700">?</text>
    </g>

    <!-- summary strip -->
    <g font-family="JetBrains Mono, monospace" font-size="10">
      <rect x="24" y="256" width="452" height="0" />
      <text x="24" y="270" fill="#3ddc84">● 1,842 matched</text>
      <text x="180" y="270" fill="#ff5f57">● 37 mismatched</text>
      <text x="330" y="270" fill="#febc2e">● 12 unresolved</text>
    </g>
  </g>

  <rect x="0" y="396" width="640" height="4" fill="url(#accent3)"/>
</svg>
