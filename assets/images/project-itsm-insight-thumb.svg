      <line x1="14" y1="76" x2="440" y2="76" stroke="rgba(255,255,255,0.08)"/>
    </g>

    <!-- incident rows -->
    <g font-family="JetBrains Mono, monospace" font-size="10.5">
      <rect x="24" y="228" width="454" height="24" rx="6" fill="#17171b"/>
      <rect x="34" y="234" width="30" height="12" rx="6" fill="#ff5f57" opacity="0.18"/>
      <text x="38" y="243" font-size="8.5" fill="#ff8f89">P1</text>
      <text x="76" y="244" fill="#d6d6d6">Payment gateway timeout — breached</text>

      <rect x="24" y="256" width="454" height="24" rx="6" fill="#17171b"/>
      <rect x="34" y="262" width="30" height="12" rx="6" fill="#febc2e" opacity="0.18"/>
      <text x="39" y="271" font-size="8.5" fill="#ffd679">P2</text>
      <text x="76" y="272" fill="#d6d6d6">DB replication lag — at risk</text>
    </g>
  </g>

  <rect x="0" y="396" width="640" height="4" fill="url(#accent2)"/>
</svg>
